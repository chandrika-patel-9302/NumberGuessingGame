<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fourth Project</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            background-color: black;
            color: white;
        }
        nav{
            display: flex;
            justify-content: center;
            gap: 5%;
            background-color: lightgrey;
            padding: 10px;
        }
        nav a{
            border: 2px solid black;
            text-decoration: none;
            padding-left: 15px;
            padding-right: 15px;
            background-color: grey;
            color: black;
        }
        .wrapper{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .guessField{
            border: none;
            padding: 10px;
            border-radius: 5px;
            background-color: white;
            color: black;
        }
        .submit{
            display: flex;
            justify-content: center;
        }
        .guessSubmit{
            padding: 10px;
            border: 2px solid white;
            background-color: white;
            color: black;
            border-radius: 10px;
        }
        .form{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #guess{
            font-size: 40px;
        }

    </style>
</head>
<body>
    <nav>
        <a href="/" aria-current="page">Home</a>
        <a target="_blank" href="google.com">Google</a>
    </nav>
    <div class="wrapper">
        <h1>Number guessing game</h1><br>
        <p>Try and guess a random number between 1 and 100.</p>
        <p>You have 10 attempts to guess the right number.</p> <br>
        <form action="" class="form">
            <label for="guessField" id="guess">Guess a Number:</label><br>
            <input type="text" id="guessField" class="guessField"> <br><br>
            <div class="submit" ><input type="submit" id="subt" value="submit guess" class="guessSubmit"></div>
        </form><br>
        <div class="resultParas">
            <p>Previous guesses: <span class="guesses"></span></p>
            <p>guesses Remaining: <span class="lastResult">10</span></p>
            <p class="lowOrHi"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
